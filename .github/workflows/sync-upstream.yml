name: Sync upstream openclaw

on:
  schedule:
    - cron: '20 */6 * * *' # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/openclaw/openclaw.git || true
          git fetch upstream main

      - name: Rebase main onto upstream/main
        run: |
          git checkout main
          git rebase upstream/main

      - name: Push rebased main (prefer SYNC_PAT)
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
        run: |
          TOKEN="${SYNC_PAT:-$GITHUB_TOKEN}"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force-with-lease origin main
